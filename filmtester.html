<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aurora Background</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    color: white;
    font-family: sans-serif;
    background: #0b0d12;
}

.background {
    position: fixed;
    inset: 0;
    z-index: -1;
    filter: blur(60px);
    opacity: 0.9;
}

.blob {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    mix-blend-mode: screen;
    animation: float 12s infinite ease-in-out;
}

.blob:nth-child(1) {
    background: radial-gradient(circle, #ff4d6d, transparent 60%);
    top: 10%;
    left: 15%;
}

.blob:nth-child(2) {
    background: radial-gradient(circle, #4cc9f0, transparent 60%);
    top: 40%;
    left: 60%;
    animation-delay: -4s;
}

.blob:nth-child(3) {
    background: radial-gradient(circle, #b517ff, transparent 60%);
    top: 70%;
    left: 30%;
    animation-delay: -8s;
}

@keyframes float {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(80px,-60px) scale(1.2); }
    100% { transform: translate(0,0) scale(1); }
}

.content {
    position: relative;
    z-index: 1;
    display: flex;
    height: 100vh;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
}
</style>
</head>

<body>

<div class="background">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
</div>

<div class="content">
    Aurora Film Background
</div>

</body>
</html>
