<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Music</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Helvetica, Arial, sans-serif;
    background:#F7ECE8;
    color:#222;
    overflow-x:hidden;

}

.hero{

    min-height:100vh;

    display:flex;
    justify-content:space-between;
    align-items:flex-start;

    padding:90px 8%;

}

.left{

    width:34%;

}

.right{

    width:56%;

}

h1{

    font-size:5rem;
    font-weight:300;
    letter-spacing:.15em;
    margin-bottom:20px;

}

.subtitle{

    color:#666;
    line-height:1.8;
    margin-bottom:70px;
    max-width:320px;

}

/* ---------------- Shelf ---------------- */

.shelf{

    position:relative;
    width:100%;
    height:14px;

    background:#9A7053;
    border-radius:20px;

    box-shadow:
        0 8px 18px rgba(0,0,0,.18);

}

.records{

    display:flex;
    justify-content:space-between;

    margin-top:-205px;

    padding:0 10px;

}

.album{

    position:relative;

    width:105px;
    height:190px;

}


</style>

</head>

<body>

<section class="hero">

<div class="left">

<h1>MUSIC</h1>

<p class="subtitle">

Original Scores<br>
Film Music<br>
Instrumental Works

</p>



<div class="shelf"></div>

</div>

<div class="right">


<div class="shelf"></div>

</div>

<div class="right">
<div class="shelf"></div>

</div>

<div class="right">
</div>

</section>



  
</body>

</html>
