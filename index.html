<body>

	<!-- DECK CAROUSEL -->

		<button class="deck-btn left" onclick="move(-1)">‹</button>

		<div class="deck-track" id="deckTrack">

			<div class="card"><img src="images/pic1.png"></div>
			<div class="card"><img src="images/pic2.png"></div>

</section>

<!-- NAV GRID -->
<section class="nav-dimension">

	<div class="grid">
		<a href="film.html" class="card">film</a>
		<a href="art.html" class="card">art</a>

	</div>

</section>
	<script>

let current = 0;

const track = document.getElementById("deckTrack");
const cards = document.querySelectorAll(".deck .card");

function updateDeck() {

	/* remove active */
	cards.forEach(card => {
		card.classList.remove("active");
	});

	/* active center card */
	cards[current].classList.add("active");

	/* move track */
	const offset = current * 68;

	track.style.transform = `translateX(-${offset}%)`;
}

function move(direction) {

	current += direction;

	/* loop */
	if (current < 0) {
		current = cards.length - 1;
	}

	if (current >= cards.length) {
		current = 0;
	}

	updateDeck();
}

/* initial load */
updateDeck();

</script>	
	<script>

const revealCards = document.querySelectorAll(".nav-dimension .card");

const observer = new IntersectionObserver(entries => {

	entries.forEach(entry => {

		if(entry.isIntersecting) {
			entry.target.classList.add("show");
		}

	});

}, {
	threshold: 0.2
});

revealCards.forEach(card => {
	observer.observe(card);
});

</script>
	<script>

const menuToggle = document.getElementById("menuToggle");
const fullscreenMenu = document.getElementById("fullscreenMenu");

menuToggle.addEventListener("click", () => {

	menuToggle.classList.toggle("active");
	fullscreenMenu.classList.toggle("show");

});

</script>
