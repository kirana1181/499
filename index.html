<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="main.css">
</head>

<body>

	<!-- HERO SECTION -->
	<section class="hero">
		<!-- VIDEO BACKGROUND -->
		<video autoplay muted loop playsinline>
			<source src="videos/hdbackground.mp4" type="video/mp4">
		</video>
		<!-- TEXT OVER VIDEO -->
		<div class="hero-content">
			<h1 class="hero-title">
				portfolio 
			</h1>
			<img class="profile-pic" src="images/profile.jpg" alt="Profile picture"> <br> <br>
<p class="byline">by kiran</p>
			</div> 
	</section>

	<!-- SECOND SECTION -->
	<section class="content-section">
		<h2>
			a conglomeration of various projects. <br> film, photo, art, and electronic exibitions
		</h2>

		<!-- SLIDESHOW / IMAGE GRID -->
		<div class="slideshow">
			<img src="images/pic1.jpg" alt="">
			<img src="images/pic2.jpg" alt="">
			<img src="images/pic3.jpg" alt="">
		</div>
	</section>

<section class="tree-scroll">

	<svg class="tree-svg" viewBox="0 0 1000 500" preserveAspectRatio="none">

		<!-- vertical spine -->
		<path class="line" d="M500 0 L500 150" />

		<!-- branches -->
		<path class="line" d="M500 150 L200 300" />
		<path class="line" d="M500 150 L320 300" />
		<path class="line" d="M500 150 L440 300" />
		<path class="line" d="M500 150 L560 300" />
		<path class="line" d="M500 150 L680 300" />
		<path class="line" d="M500 150 L800 300" />

	</svg>

	<!-- CLICKABLE NODES (positioned to match endpoints) -->
	<div class="node film">film</div>
	<div class="node art">art</div>
	<div class="node music">music</div>
	<div class="node photo">photo</div>
	<div class="node digital">digital</div>
	<div class="node electronic">electronic</div>

</section>


</body>

</html>
