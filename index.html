# index.html

```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- VIDEO HERO -->

    <section class="hero">

        <video autoplay muted loop playsinline class="hero-video">
            <source src="assets/videos/showreel.mp4" type="video/mp4">
        </video>

        <div class="overlay"></div>

        <div class="hero-content">
            <h1>PORTFOLIO</h1>
            <p>Film • Theatre • Writing • Direction</p>
        </div>

    </section>

    <!-- ABOUT SECTION -->

    <section class="about">

        <div class="container">
            <h2>About</h2>

            <p>
                This is your main introduction section. Replace this text
                with your artist statement, bio, or project description.
            </p>

            <p class="blue-times">
                cinematic storytelling for the end of the world.
            </p>
        </div>

    </section>

    <!-- SLIDESHOW SECTION -->

    <section class="gallery-section">

        <h2>Selected Work</h2>

        <div class="slideshow-container">

            <img class="slide active" src="images/pic01.jpg" alt="">
            <img class="slide" src="images/pic02.jpg" alt="">
            <img class="slide" src="images/pic03.jpg" alt="">

        </div>

    </section>

    <script>

        const slides = document.querySelectorAll('.slide');
        let current = 0;

        setInterval(() => {

            slides[current].classList.remove('active');

            current = (current + 1) % slides.length;

            slides[current].classList.add('active');

        }, 3000);

    </script>

</body>
</html>
```
