<!DOCTYPE html>
<html lang="en">

<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Photography</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;500&display=swap" rel="stylesheet">

	<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="photo.css">

</head>

<body>

<!-- =========================
     PHOTO LAYOUT
========================= -->

<section class="photo-layout">

	<!-- =========================================
	     LEFT SIDE ARCHIVE
	========================================= -->

	<div class="tree">

		<button class="node active" data-gallery="horses">
			horses of rhosilli bay
		</button>

		<button class="node" data-gallery="london">

		</button>

		</button>

		</button>

			animals
		</button>

			portraits
		</button>

		<button class="node" data-gallery="france">
			france
		</button>

	</div>

	<!-- =========================================
	     RIGHT SIDE VIEWER
	========================================= -->

	<div class="viewer">

		<!-- =========================
		     HORSES
		========================= -->

		<div class="gallery active" id="horses">

			<div class="deck">

				<button class="deck-btn left">‹</button>

				<div class="deck-track">

					<div class="deck-card active">
						<img src="images/horses1.jpg" alt="">
					</div>

					<div class="deck-card next">
						<img src="images/horses2.jpg" alt="">
					</div>

					<div class="deck-card">
						<img src="images/horses3.jpg" alt="">
					</div>

				</div>

				<button class="deck-btn right">›</button>

			</div>

		</div>

		<!-- =========================
		     LONDON
		========================= -->

		<div class="gallery" id="london">

				<button class="deck-btn left">‹</button>

				<div class="deck-track">

					<div class="deck-card active">
						<img src="images/london1.jpg" alt="">
					</div>

					<div class="deck-card next">
						<img src="images/london2.jpg" alt="">
					</div>

					<div class="deck-card">
						<img src="images/london3.jpg" alt="">
					</div>

				</div>

				<button class="deck-btn right">›</button>

			</div>

		</div>

		     NAVIGATION

				<button class="deck-btn left">‹</button>

				<div class="deck-track">

					<div class="deck-card active">
						<img src="images/nav1.jpg" alt="">
					</div>

					<div class="deck-card next">
						<img src="images/nav2.jpg" alt="">
					</div>

					<div class="deck-card">
						<img src="images/nav3.jpg" alt="">
					</div>

				</div>

				<button class="deck-btn right">›</button>

			</div>

		</div>

		<!-- =========================
		     FLORIDA
		========================= -->

		<div class="gallery" id="florida">

			<div class="deck">

				<button class="deck-btn left">‹</button>

				<div class="deck-track">

		<!-- =========================

			<div class="deck">

				<div class="deck-track">

					<div class="deck-card active">
						<img src="images/animals1.jpg" alt="">

					<div class="deck-card next">

	</div>

</section>

<!-- =========================
     JAVASCRIPT
========================= -->

<script>

const buttons = document.querySelectorAll(".node");
const galleries = document.querySelectorAll(".gallery");

/* =========================================
   SWITCH EXHIBITIONS
========================================= */

buttons.forEach(button => {

	button.addEventListener("click", () => {

		buttons.forEach(btn => btn.classList.remove("active"));
		galleries.forEach(gallery => gallery.classList.remove("active"));

		button.classList.add("active");

		const target =
			document.getElementById(button.dataset.gallery);

		target.classList.add("active");

	});

});

/* =========================================
   DECK CAROUSELS
========================================= */

document.querySelectorAll(".deck").forEach(deck => {

	const track = deck.querySelector(".deck-track");

	const cards =
		deck.querySelectorAll(".deck-card");

	const leftBtn =
		deck.querySelector(".left");

	const rightBtn =
		deck.querySelector(".right");

	let index = 0;

	function updateDeck() {

		cards.forEach(card => {
			card.classList.remove(
				"active",
				"prev",
				"next"
			);
		});

		cards[index].classList.add("active");

		if(index > 0) {
			cards[index - 1].classList.add("prev");
		}

		if(index < cards.length - 1) {
			cards[index + 1].classList.add("next");
		}

		const offset =
			(cards[0].offsetWidth + 16) * index;

		const center =
			(deck.offsetWidth / 2) -
			(cards[0].offsetWidth / 2);

		track.style.transform =
			`translateX(${center - offset}px)`;
	}

	rightBtn.addEventListener("click", () => {

		index++;

		if(index >= cards.length) {
			index = cards.length - 1;
		}

		updateDeck();

	});

	leftBtn.addEventListener("click", () => {

		index--;

		if(index < 0) {
			index = 0;
		}

		updateDeck();

	});

	updateDeck();

});

</script>

</body>
</html>
