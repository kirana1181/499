<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="photo.css">
</head>

<body>

    <div class="left-ui">

    <a class="back-btn" href="https://kirana1181.github.io/499/">
        ← Return
    </a>

<section class="photo-layout">

    <!-- LEFT TREE -->
    <div class="tree">

        <div class="tree-line"></div>

        <button class="node active" data-gallery="horses">horses of rhosilli bay</button>
        <button class="node" data-gallery="london">downtown london</button>
        <button class="node" data-gallery="navigation">navigation that guides you</button>
        <button class="node" data-gallery="florida">florida</button>
        <button class="node" data-gallery="animals">animals</button>
        <button class="node" data-gallery="portraits">portraits</button>
        <button class="node" data-gallery="france">france</button>

    </div>

    <!-- RIGHT VIEWER -->
    <div class="viewer">

        <div class="film-window">

            <div class="film-strip active" id="horses">
                <img src="images/horses1.jpg">
                <img src="images/horses2.jpg">
                <img src="images/horses3.jpg">
            </div>

            <div class="film-strip" id="london">
                <img src="images/london1.jpg">
                <img src="images/london2.jpg">
                <img src="images/london3.jpg">
            </div>

            <div class="film-strip" id="navigation">
                <img src="images/nav1.jpg">
                <img src="images/nav2.jpg">
                <img src="images/nav3.jpg">
            </div>

            <div class="film-strip" id="florida">
                <img src="images/florida1.jpg">
                <img src="images/florida2.jpg">
            </div>

            <div class="film-strip" id="animals">
                <img src="images/animals1.jpg">
                <img src="images/animals2.jpg">
            </div>

            <div class="film-strip" id="portraits">
                <img src="images/portraits1.jpg">
                <img src="images/portraits2.jpg">
            </div>

            <div class="film-strip" id="france">
                <img src="images/france1.jpg">
                <img src="images/france2.jpg">
            </div>

        </div>

    </div>

</section>

<script>
const nodes = document.querySelectorAll(".node");
const strips = document.querySelectorAll(".film-strip");

nodes.forEach(btn => {
    btn.addEventListener("click", () => {

        nodes.forEach(n => n.classList.remove("active"));
        strips.forEach(s => s.classList.remove("active"));

        btn.classList.add("active");

        document.getElementById(btn.dataset.gallery)
            .classList.add("active");
    });
});
</script>

</body>
</html>
