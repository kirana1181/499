<!DOCTYPE html>
<html lang="en">

<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Photography</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;500&display=swap" rel="stylesheet">

	<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="photo.css">

</head>

<body>

<!-- =========================
     PHOTO LAYOUT
========================= -->

<section class="photo-layout">

	<!-- =========================================
	     LEFT SIDE ARCHIVE
	========================================= -->

	<div class="tree">

		<button class="node active" data-gallery="horses">
			horses of rhosilli bay
		</button>

		<button class="node" data-gallery="london">
			downtown london
		</button>

		<button class="node" data-gallery="navigation">
			navigation that guides you
		</button>

		<button class="node" data-gallery="florida">
			florida
		</button>

		<button class="node" data-gallery="animals">
			animals
		</button>

		<button class="node" data-gallery="portraits">
			portraits
		</button>

		<button class="node" data-gallery="france">
			france
		</button>

	</div>

	<!-- =========================================
	     RIGHT SIDE VIEWER
	========================================= -->

	<div class="viewer">

		<!-- =========================
		     HORSES
		========================= -->

		<div class="gallery active" id="horses">

			<div class="deck">

				<button class="deck-btn left">‹</button>

				<div class="deck-track">

					<div class="deck-card active">
						<img src="images/horses1.jpg" alt="">
					</div>

					<div class="deck-card next">
						<img src="images/horses2.jpg" alt="">
					</div>

					<div class="deck-card">
						<img src="images/horses3.jpg" alt="">
					</div>

				</div>

				<button class="deck-btn right">›</button>

			</div>

		</div>

		<!-- =========================
		     LONDON
		========================= -->

		<div class="gallery" id="london">

			<div class="deck">

				<button class="deck-btn left">‹</button>

				<div class="deck-track">

					<div class="deck-card active">
						<img src="images/london1.jpg" alt="">
					</div>

					<div class="deck-card next">
						<img src="images/london2.jpg" alt="">
					</div>

					<div class="deck-card">
						<img src="images/london3.jpg" alt="">
					</div>

				</div>

				<button class="deck-btn right">›</button>

			</div>

		</div>

		<!-- =========================
		     NAVIGATION
		========================= -->

		<div class="gallery" id="navigation">

			<div class="deck">

				<button class="deck-btn left">‹</button>

				<div class="deck-track">

					<div class="deck-card active">
						<img src="images/nav1.jpg" alt="">
					</div>

					<div class="deck-card next">
						<img src="images/nav2.jpg" alt="">
					</div>

					<div class="deck-card">
						<img src="images/nav3.jpg" alt="">
					</div>

				</div>

				<button class="deck-btn right">›</button>

			</div>

		</div>

		<!-- =========================
		     FLORIDA
		========================= -->

		<div class="gallery" id="florida">

			<div class="deck">

				<button class="deck-btn left">‹</button>

				<div class="deck-track">

					<div class="deck-card active">
						<img src="images/florida1.jpg" alt="">
					</div>

					<div class="deck-card next">
						<img src="images/florida2.jpg" alt="">
					</div>

				</div>

				<button class="deck-btn right">›</button>

			</div>

		</div>

		<!-- =========================
		     ANIMALS
		========================= -->

		<div class="gallery" id="animals">

			<div class="deck">

				<button class="deck-btn left">‹</button>

				<div class="deck-track">

					<div class="deck-card active">
						<img src="images/animals1.jpg" alt="">
					</div>

					<div class="deck-card next">
						<img src="images/animals2.jpg" alt="">
					</div>

				</div>

				<button class="deck-btn right">›</button>

			</div>

		</div>

		<!-- =========================
		     PORTRAITS
		========================= -->

		<div class="gallery" id="portraits">

			<div class="deck">

				<button class="deck-btn left">‹</button>

				<div class="deck-track">

					<div class="deck-card active">
						<img src="images/portraits1.jpg" alt="">
					</div>

					<div class="deck-card next">
						<img src="images/portraits2.jpg" alt="">
					</div>

				</div>

				<button class="deck-btn right">›</button>

			</div>

		</div>

		<!-- =========================
		     FRANCE
		========================= -->

		<div class="gallery" id="france">

			<div class="deck">

				<button class="deck-btn left">‹</button>

				<div class="deck-track">

					<div class="deck-card active">
						<img src="images/france1.jpg" alt="">
					</div>

					<div class="deck-card next">
						<img src="images/france2.jpg" alt="">
					</div>

				</div>

				<button class="deck-btn right">›</button>

			</div>

		</div>

	</div>

</section>
</body>
</html>
