<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Photography</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;500&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="main.css">
	<link rel="stylesheet" href="photo.css">
</head>

<body>

<!-- =========================
     PHOTOGRAPHY PAGE
========================= -->

<section class="photo-layout">

	<!-- LEFT: TREE HOTSPOTS -->
	<div class="tree">

		<button class="node active" data-gallery="horses">
			horses of rhosilli bay
		</button>

		<button class="node" data-gallery="london">
			downtown london
		</button>

		<button class="node" data-gallery="navigation">
			navigation that guides you
		</button>

		<button class="node" data-gallery="florida">
			florida
		</button>

		<button class="node" data-gallery="animals">
			animals
		</button>

		<button class="node" data-gallery="portraits">
			portraits
		</button>

		<button class="node" data-gallery="france">
			france
		</button>

	</div>

	<!-- RIGHT: VIEWER -->
	<div class="viewer">

		<div class="gallery active" id="horses">
			<img src="images/horses1.jpg">
			<img src="images/horses2.jpg">
			<img src="images/horses3.jpg">
		</div>

		<div class="gallery" id="london">
			<img src="images/london1.jpg">
			<img src="images/london2.jpg">
			<img src="images/london3.jpg">
		</div>

		<div class="gallery" id="navigation">
			<img src="images/nav1.jpg">
			<img src="images/nav2.jpg">
			<img src="images/nav3.jpg">
		</div>

		<div class="gallery" id="florida">
			<img src="images/florida1.jpg">
			<img src="images/florida2.jpg">
		</div>

		<div class="gallery" id="animals">
			<img src="images/animals1.jpg">
			<img src="images/animals2.jpg">
		</div>

		<div class="gallery" id="portraits">
			<img src="images/portraits1.jpg">
			<img src="images/portraits2.jpg">
		</div>

		<div class="gallery" id="france">
			<img src="images/france1.jpg">
			<img src="images/france2.jpg">
		</div>

	</div>

</section>

<!-- =========================
     SCRIPT (IMPORTANT: before </body>)
========================= -->

<script>
	const buttons = document.querySelectorAll(".node");
	const galleries = document.querySelectorAll(".gallery");

	buttons.forEach(btn => {
		btn.addEventListener("click", () => {

			buttons.forEach(b => b.classList.remove("active"));
			galleries.forEach(g => g.classList.remove("active"));

			btn.classList.add("active");

			const target = document.getElementById(btn.dataset.gallery);
			target.classList.add("active");
		});
	});
</script>

</body>
</html>
