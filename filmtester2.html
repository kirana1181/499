<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Room</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: #0a0a0f;
    color: white;
    font-family: sans-serif;
}

.bg {
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,0,150,0.25), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(0,200,255,0.25), transparent 45%),
        radial-gradient(circle at 50% 90%, rgba(255,200,0,0.15), transparent 50%);
    filter: blur(40px);
}

.scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 2px,
        transparent 6px
    );
    opacity: 0.2;
    pointer-events: none;
}

.content {
    position: relative;
    display: flex;
    height: 100vh;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="scanlines"></div>

<div class="content">
    Neon Projection Room
</div>

</body>
</html>
